<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>单词测试 - 现场测试</title>
<style>
body{font-family:-apple-system,sans-serif;padding:20px;max-width:430px;margin:0 auto;background:#f2f2f7}
#log{background:#1c1c1e;color:#0f0;padding:16px;border-radius:12px;font-size:13px;font-family:monospace;white-space:pre-wrap;margin-top:20px;max-height:300px;overflow:auto}
.quiz-options{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.quiz-option{padding:18px;border-radius:12px;border:1.5px solid #ddd;background:#fff;font-size:17px;cursor:pointer;text-align:left}
.quiz-option.correct{border-color:#34c759;background:#e8f8ee;color:#34c759}
.quiz-option.wrong{border-color:#ff3b30;background:#fff0ef;color:#ff3b30}
.quiz-option.disabled{opacity:0.5;pointer-events:none}
#feedback{margin-top:16px;font-weight:600;min-height:24px;text-align:center;font-size:18px}
button{padding:14px 28px;border:none;border-radius:12px;background:#007aff;color:#fff;font-size:16px;cursor:pointer}
.result{display:none;text-align:center;padding:20px}
</style></head><body>
<h2>🧪 单词测试验证</h2>
<p id="status">正在初始化...</p>
<button id="startBtn">🔄 开始测试</button>
<div id="quizArea" style="display:none">
  <div id="word" style="font-size:32px;font-weight:700;text-align:center"></div>
  <div style="text-align:center;color:#888;margin-bottom:8px" id="qProgress"></div>
  <div class="quiz-options" id="quizOptions"></div>
  <div id="feedback"></div>
</div>
<div class="result" id="resultArea">
  <div style="font-size:48px;font-weight:800;color:#007aff" id="score"></div>
  <button onclick="startTest()" style="margin-top:16px">🔄 再来一次</button>
</div>
<div id="log">[日志]\n</div>

<script>
const $ = s => document.querySelector(s);
const log = msg => { const l = $('#log'); l.textContent += msg + '\n'; l.scrollTop = l.scrollHeight; };
const DATA = {
  daily:[{en:"breakfast",zh:"早餐"},{en:"lunch",zh:"午餐"},{en:"dinner",zh:"晚餐"},{en:"water",zh:"水"},{en:"fruit",zh:"水果"}],
  work:[{en:"meeting",zh:"会议"},{en:"report",zh:"报告"},{en:"salary",zh:"薪水"},{en:"office",zh:"办公室"},{en:"manager",zh:"经理"}]
};

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let words=[],idx=0,correct=0,answered=false;

function startTest(){
  const all=[]; for(const k of Object.keys(DATA)) all.push(...DATA[k]);
  shuffle(all); words=all.slice(0,6); idx=0; correct=0; answered=false;
  $('#quizArea').style.display=''; $('#resultArea').style.display='none';
  $('#feedback').textContent=''; $('#status').textContent='测试中...';
  showQ();
}

function showQ(){
  if(idx>=words.length){showResult();return;}
  const w=words[idx]; $('#word').textContent=w.en; $('#qProgress').textContent=(idx+1)+'/'+words.length;
  answered=false;
  const ans=w.zh; const allZh=[];
  for(const k of Object.keys(DATA)) for(const ww of DATA[k]) allZh.push(ww.zh);
  const opts=[ans]; while(opts.length<4){const p=allZh[Math.floor(Math.random()*allZh.length)]; if(!opts.includes(p))opts.push(p);}
  shuffle(opts);
  const c=$('#quizOptions'); c.innerHTML=opts.map(o=>'<button class="quiz-option" data-zh="'+o.replace(/"/g,'&quot;')+'">'+o+'</button>').join('');
  c.dataset.correct=ans;
  log('显示题目: '+w.en+' 正确答案: ['+ans+']');
}

// ===== 全局点击 - 与真实代码完全一致 =====
document.addEventListener('click', function(e){
  // 修复后的写法
  const btn = e.target.closest('.quiz-option');
  if(!btn) return;
  log('点击了: ['+btn.textContent+'] 位于#quizOptions内='+!!btn.closest('#quizOptions')+' disabled='+btn.classList.contains('disabled'));
  if(!btn.closest('#quizOptions')||btn.classList.contains('disabled')) return;
  const c=document.getElementById('quizOptions');
  if(!c||!c.dataset.correct) return;
  const ans=c.dataset.correct;
  handleAnswer(btn,ans);
});

function handleAnswer(btn,ans){
  if(answered){log('已作答，忽略');return;}
  answered=true;
  const sel=btn.dataset.zh; const isRight=sel===ans;
  log('选择: ['+sel+'] 正确: ['+ans+'] 结果: '+(isRight?'✅正确':'❌错误'));
  if(isRight){correct++;$('#feedback').textContent='✅ 正确！';$('#feedback').style.color='#34c759';btn.classList.add('correct');
  }else{$('#feedback').textContent='❌ 答案是：'+ans;$('#feedback').style.color='#ff3b30';btn.classList.add('wrong');
    $('#quizOptions').querySelectorAll('.quiz-option').forEach(b=>{if(b.dataset.zh===ans)b.classList.add('correct');});
  }
  $('#quizOptions').querySelectorAll('.quiz-option').forEach(b=>b.classList.add('disabled'));
  setTimeout(()=>{idx++;showQ();},1200);
}

function showResult(){
  $('#quizArea').style.display='none';$('#resultArea').style.display='block';
  $('#score').textContent=correct+'/'+words.length;
  $('#status').textContent='测试完成！';
  log('=== 测试完成 ===');
}

$('#startBtn').onclick=startTest;
$('#status').textContent='就绪，点击开始测试';
log('页面加载完成');
</script>
</body></html>
